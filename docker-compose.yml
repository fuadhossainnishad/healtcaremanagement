version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: healthcare-postgres
    restart: always
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: healthcare-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/healthcare_db
      SPRING_DATABASE_USERNAME: postgres
      SPRING_DATABASE_PASSWORD: root

volumes:
  postgres_data:
